<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Visualizer Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force absolute transparency for the entire app container */
        html, body { 
            background: transparent !important; 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
        }

        #visualizer-canvas { 
            background: transparent !important; 
            width: 100%; 
            height: 100%; 
            display: block; 
        }

        /* Overlay mode hides UI entirely */
        body.overlay-mode #controls-sidebar, 
        body.overlay-mode header { 
            display: none !important; 
        }
    </style>
</head>
<body>

    <!-- Header / Sidebar visible only when NOT in overlay mode -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4">
        <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">Stream Visualizer Suite</h1>
    </header>

    <div id="controls-sidebar" class="p-6 bg-gray-950 text-white w-80">
        <label class="block text-sm mb-2">Bar Opacity</label>
        <input type="range" id="slider-opacity" min="0.10" max="1.00" step="0.05" value="1.00" class="w-full mb-6 accent-purple-500" />
        
        <button id="btn-overlay-mode" class="w-full bg-purple-600 hover:bg-purple-500 py-2 rounded-xl text-sm transition">Enter Overlay Mode</button>
    </div>

    <canvas id="visualizer-canvas"></canvas>

    <script>
        const canvas = document.getElementById('visualizer-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const sliderOpacity = document.getElementById('slider-opacity');
        let barOpacity = 1.0;

        sliderOpacity.addEventListener('input', (e) => { barOpacity = parseFloat(e.target.value); });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            // ALWAYS clear the canvas fully (transparent)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Gold Bars
            ctx.save();
            ctx.fillStyle = '#d4af37';
            ctx.globalAlpha = barOpacity;
            
            const barCount = 40;
            const barSpacing = canvas.width / barCount;
            
            for(let i = 0; i < barCount; i++) {
                const x = barSpacing * i;
                // Height based on a sine wave for smooth movement
                const h = (Math.sin(Date.now() / 200 + i) * 100) + 120;
                ctx.fillRect(x + 5, canvas.height - h, barSpacing - 10, h);
            }
            ctx.restore();
            
            requestAnimationFrame(draw);
        }
        draw();

        document.getElementById('btn-overlay-mode').addEventListener('click', () => {
            document.body.classList.add('overlay-mode');
        });

        // Auto-trigger overlay if URL has #overlay
        if (window.location.hash === '#overlay') {
            document.body.classList.add('overlay-mode');
        }
    </script>
</body>
</html>
